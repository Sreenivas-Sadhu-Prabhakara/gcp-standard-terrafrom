# Apolaki Solar Platform - Netlify Configuration
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # Directory with the production-ready HTML files and assets
  publish = "."
  
  # Directory containing Netlify Functions
  functions = "netlify/functions"
  
  # Build command (Go functions are built automatically by Netlify)
  command = "echo 'Build complete'"

# Redirects - Route API calls to serverless functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/api/health"
  status = 200

[[redirects]]
  from = "/api/calculate"
  to = "/.netlify/functions/api/calculate"
  status = 200

# SPA fallback for client-side routing (if needed)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = {Role = ["admin"]}

# Headers for security and caching
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Environment variables (set in Netlify dashboard)
[build.environment]
  GO_VERSION = "1.21"
  NODE_VERSION = "18"

# Functions configuration
[functions]
  # Go functions directory
  directory = "netlify/functions"
  
  # Include Go files
  included_files = ["netlify/functions/**"]

# Dev server configuration for local testing
[dev]
  command = "echo 'Dev server ready'"
  port = 8888
  targetPort = 3000
  publish = "."
  autoLaunch = false
