<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apolaki Solar Estimator</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* APOLAKI THEME PALETTE */
            --bg-dark: #0f1115;       /* Deep Obsidian */
            --bg-card: #181b21;       /* Lighter Charcoal */
            --text-main: #ecf0f1;     /* White/Grey */
            --text-muted: #95a5a6;    /* Muted Steel */
            --accent-gold: #d4af37;   /* Solar Gold */
            --accent-glow: rgba(212, 175, 55, 0.3);
            --danger: #e74c3c;        /* Red for debt/interest */
            --success: #27ae60;       /* Green for savings */
            --border: #2c3e50;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* HEADER */
        header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(180deg, rgba(0,0,0,0.4) 0%, var(--bg-dark) 100%);
            border-bottom: 1px solid var(--border);
        }

        h1 {
            font-family: 'Cinzel', serif;
            color: var(--accent-gold);
            font-size: 2.5rem;
            margin: 0;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0 0 20px var(--accent-glow);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        /* LAYOUT GRID */
        .dashboard {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 30px;
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 20px;
        }

        @media (max-width: 900px) {
            .dashboard { grid-template-columns: 1fr; }
        }

        /* CARDS */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 4px; /* Sharp corners for strength */
            padding: 25px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .card-header {
            font-family: 'Cinzel', serif;
            color: var(--text-main);
            font-size: 1.2rem;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* INPUT CONTROLS */
        .control-group {
            margin-bottom: 25px;
        }

        .control-group label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-gold);
            margin-bottom: 8px;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="number"] {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px;
            border-radius: 4px;
            font-family: 'Montserrat', sans-serif;
            width: 120px;
            text-align: right;
            font-size: 1rem;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: var(--accent-gold);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        input[type="range"] {
            flex-grow: 1;
            accent-color: var(--accent-gold);
            cursor: pointer;
        }

        /* RESULTS SECTION */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .metric-box {
            background: rgba(255,255,255,0.03);
            padding: 20px;
            border-radius: 4px;
            text-align: center;
            transition: transform 0.2s;
            border: 1px solid transparent;
        }

        .metric-box:hover {
            transform: translateY(-5px);
            border-color: var(--accent-gold);
        }

        .metric-box.hero {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.1) 0%, rgba(0,0,0,0) 100%);
            border: 1px solid var(--accent-gold);
        }

        .metric-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .metric-value {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .hero .metric-value {
            font-size: 3rem;
            color: var(--accent-gold);
            text-shadow: 0 0 15px var(--accent-glow);
        }

        /* TABLE */
        .table-wrapper {
            overflow-x: auto;
            max-height: 500px;
            overflow-y: auto;
            border: 1px solid var(--border);
            border-radius: 4px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        thead {
            position: sticky;
            top: 0;
            background: var(--bg-dark);
            z-index: 2;
        }

        th {
            font-family: 'Cinzel', serif;
            color: var(--accent-gold);
            text-align: right;
            padding: 15px;
            font-weight: normal;
            border-bottom: 2px solid var(--accent-gold);
        }
        
        th:first-child { text-align: left; }

        td {
            padding: 12px 15px;
            text-align: right;
            border-bottom: 1px solid #333;
            color: var(--text-muted);
        }
        
        td:first-child { text-align: left; color: var(--text-main); }

        tr:hover td {
            background-color: rgba(212, 175, 55, 0.05);
            color: var(--text-main);
        }

        /* UTILS */
        .val-positive { color: var(--success) !important; }
        .val-negative { color: var(--danger) !important; }
        .val-gold { color: var(--accent-gold) !important; font-weight: bold; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-gold); }

    </style>
</head>
<body>

<header>
    <h1>Apolaki</h1>
    <div class="subtitle">Solar Investment Strategy & Profit Distribution</div>
</header>

<div class="dashboard">
    <aside class="card">
        <div class="card-header">Configuration</div>
        
        <div class="control-group">
            <label>Panel Cost (₹)</label>
            <div class="input-wrapper">
                <input type="number" id="panelCost" value="400000" oninput="syncInputs('panelCost', 'rangePanel')">
                <input type="range" id="rangePanel" min="0" max="1000000" step="10000" value="400000" oninput="syncInputs('rangePanel', 'panelCost')">
            </div>
        </div>

        <div class="control-group">
            <label>Battery Cost (₹)</label>
            <div class="input-wrapper">
                <input type="number" id="batteryCost" value="100000" oninput="syncInputs('batteryCost', 'rangeBattery')">
                <input type="range" id="rangeBattery" min="0" max="500000" step="5000" value="100000" oninput="syncInputs('rangeBattery', 'batteryCost')">
            </div>
        </div>

        <div class="control-group">
            <label>Setup / Install Cost (₹)</label>
            <div class="input-wrapper">
                <input type="number" id="setupCost" value="0" oninput="syncInputs('setupCost', 'rangeSetup')">
                <input type="range" id="rangeSetup" min="0" max="200000" step="1000" value="0" oninput="syncInputs('rangeSetup', 'setupCost')">
            </div>
        </div>

        <div class="control-group">
            <label>Monthly Bill Savings (Input) (₹)</label>
            <div class="input-wrapper">
                <input type="number" id="inputValue" value="20000" oninput="syncInputs('inputValue', 'rangeInput')">
                <input type="range" id="rangeInput" min="1000" max="100000" step="500" value="20000" oninput="syncInputs('rangeInput', 'inputValue')">
            </div>
        </div>

        <div class="control-group">
            <label>Interest Rate (% PA)</label>
            <div class="input-wrapper">
                <input type="number" id="interestRate" value="24" step="0.1" oninput="syncInputs('interestRate', 'rangeInt')">
                <input type="range" id="rangeInt" min="0" max="40" step="0.5" value="24" oninput="syncInputs('rangeInt', 'interestRate')">
            </div>
        </div>

        <div class="control-group">
            <label>Duration (Years)</label>
            <div class="input-wrapper">
                <input type="number" id="years" value="5" oninput="syncInputs('years', 'rangeYears')">
                <input type="range" id="rangeYears" min="1" max="20" step="1" value="5" oninput="syncInputs('rangeYears', 'years')">
            </div>
        </div>

        <div class="control-group">
            <label>Installer Profit Share (%)</label>
            <div class="input-wrapper">
                <input type="number" id="installerShare" value="33" oninput="syncInputs('installerShare', 'rangeShare')">
                <input type="range" id="rangeShare" min="0" max="100" step="1" value="33" oninput="syncInputs('rangeShare', 'installerShare')">
            </div>
        </div>
    </aside>

    <main>
        <div class="results-grid">
            <div class="metric-box hero">
                <div class="metric-label">Net Monthly Cashflow</div>
                <div class="metric-value" id="dispNetMonthly">₹0</div>
            </div>
            
            <div class="metric-box">
                <div class="metric-label">Total CapEx</div>
                <div class="metric-value" id="dispTotalPrincipal">₹0</div>
            </div>

            <div class="metric-box">
                <div class="metric-label">Monthly EMI</div>
                <div class="metric-value val-negative" id="dispEMI">₹0</div>
            </div>

            <div class="metric-box">
                <div class="metric-label">Installer Total Share</div>
                <div class="metric-value val-gold" id="dispInstallerTotal">₹0</div>
                <div style="font-size:0.7em; color: #666;" id="lblInstallerShare">33%</div>
            </div>

            <div class="metric-box">
                <div class="metric-label">Commissioner Total Share</div>
                <div class="metric-value val-gold" id="dispCommTotal">₹0</div>
                <div style="font-size:0.7em; color: #666;" id="lblCommShare">67%</div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <span>Projection Schedule</span>
                <span style="font-size: 0.8rem; font-family: 'Montserrat'">Monthly Breakdown</span>
            </div>
            <div class="table-wrapper">
                <table id="scheduleTable">
                    <thead>
                        <tr>
                            <th>Mo.</th>
                            <th>Loan Balance</th>
                            <th>EMI (Out)</th>
                            <th>Bill (In)</th>
                            <th>Net Profit</th>
                            <th>Installer</th>
                            <th>Commissioner</th>
                        </tr>
                    </thead>
                    <tbody>
                        </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script>
    // --- UTILS ---
    const formatCurrency = (num) => {
        return new Intl.NumberFormat('en-IN', { 
            style: 'currency', 
            currency: 'INR', 
            maximumFractionDigits: 0 
        }).format(num);
    };

    // Sync Slider and Number Input
    const syncInputs = (sourceId, targetId) => {
        document.getElementById(targetId).value = document.getElementById(sourceId).value;
        calculate();
    };

    // --- MAIN CALCULATION ---
    function calculate() {
        // 1. Get Values
        const panelCost = parseFloat(document.getElementById('panelCost').value) || 0;
        const batteryCost = parseFloat(document.getElementById('batteryCost').value) || 0;
        const setupCost = parseFloat(document.getElementById('setupCost').value) || 0;
        const inputValue = parseFloat(document.getElementById('inputValue').value) || 0;
        const annualRate = parseFloat(document.getElementById('interestRate').value) || 0;
        const years = parseFloat(document.getElementById('years').value) || 0;
        const installerSharePct = parseFloat(document.getElementById('installerShare').value) || 0;

        // 2. Logic
        const totalPrincipal = panelCost + batteryCost + setupCost;
        const months = years * 12;
        const monthlyRate = (annualRate / 100) / 12;
        const commSharePct = 100 - installerSharePct;

        let emi = 0;
        if (totalPrincipal > 0) {
            if (monthlyRate > 0) {
                emi = (totalPrincipal * monthlyRate * Math.pow(1 + monthlyRate, months)) / (Math.pow(1 + monthlyRate, months) - 1);
            } else {
                emi = totalPrincipal / months;
            }
        }

        const monthlyNetProfit = inputValue - emi;
        const monthlyInstallerShare = monthlyNetProfit * (installerSharePct / 100);
        const monthlyCommShare = monthlyNetProfit * (commSharePct / 100);

        // 3. Update Metrics
        document.getElementById('dispTotalPrincipal').innerText = formatCurrency(totalPrincipal);
        document.getElementById('dispEMI').innerText = formatCurrency(emi);
        document.getElementById('dispNetMonthly').innerText = formatCurrency(monthlyNetProfit);
        
        // Color coding for Net Monthly
        const netDisplay = document.getElementById('dispNetMonthly');
        if(monthlyNetProfit >= 0) {
            netDisplay.style.color = 'var(--accent-gold)';
            netDisplay.style.textShadow = '0 0 15px var(--accent-glow)';
        } else {
            netDisplay.style.color = 'var(--danger)';
            netDisplay.style.textShadow = 'none';
        }

        document.getElementById('dispInstallerTotal').innerText = formatCurrency(monthlyInstallerShare * months);
        document.getElementById('dispCommTotal').innerText = formatCurrency(monthlyCommShare * months);
        
        document.getElementById('lblInstallerShare').innerText = `${installerSharePct}% Share`;
        document.getElementById('lblCommShare').innerText = `${commSharePct}% Share`;

        // 4. Update Table
        const tbody = document.querySelector('#scheduleTable tbody');
        tbody.innerHTML = '';

        let balance = totalPrincipal;
        
        for (let i = 1; i <= months; i++) {
            let interestPart = balance * monthlyRate;
            let principalPart = emi - interestPart;
            balance -= principalPart;
            if (balance < 0) balance = 0;

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${i}</td>
                <td>${formatCurrency(balance + principalPart)}</td>
                <td class="val-negative">${formatCurrency(emi)}</td>
                <td class="val-success">${formatCurrency(inputValue)}</td>
                <td class="${monthlyNetProfit >= 0 ? 'val-gold' : 'val-negative'}">${formatCurrency(monthlyNetProfit)}</td>
                <td>${formatCurrency(monthlyInstallerShare)}</td>
                <td>${formatCurrency(monthlyCommShare)}</td>
            `;
            tbody.appendChild(tr);
        }
    }

    // Init
    window.onload = calculate;
</script>

</body>
</html>
